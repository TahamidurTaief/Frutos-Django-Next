<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ meta.verbose_name }} - {{ instance }}</title>
    <link rel="stylesheet" href="/static/assets/css/style.css">
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .print-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .print-header {
            border-bottom: 3px solid #3b82f6;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        
        .print-header h1 {
            margin: 0;
            color: #1f2937;
            font-size: 28px;
        }
        
        .print-header .subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .field-group {
            margin-bottom: 20px;
        }
        
        .field-label {
            font-weight: 600;
            color: #4b5563;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }
        
        .field-value {
            font-size: 15px;
            color: #1f2937;
            padding: 10px;
            background: #f9fafb;
            border-left: 3px solid #3b82f6;
        }
        
        .print-footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            text-align: center;
            color: #6b7280;
            font-size: 13px;
        }
        
        .btn-print {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }
        
        .btn-print:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <button class="btn-print no-print" onclick="window.print()">
        <i class="ri-printer-line"></i> Print
    </button>
    
    <div class="print-container">
        <div class="print-header">
            <h1>{{ meta.verbose_name }}</h1>
            <div class="subtitle">{{ instance }}</div>
            <div class="subtitle">Generated on {{ now|date:"F d, Y H:i" }}</div>
        </div>
        
        <div class="row">
            {% for field_data in fields_data %}
                <div class="col-md-{% if 'description' in field_data.name or 'text' in field_data.name %}12{% else %}6{% endif %}">
                    <div class="field-group">
                        <div class="field-label">{{ field_data.verbose_name }}</div>
                        <div class="field-value">{{ field_data.value|safe }}</div>
                    </div>
                </div>
            {% endfor %}
        </div>
        
        <div class="print-footer">
            <p>&copy; {{ now|date:"Y" }} iCommerce. All rights reserved.</p>
            <p>This is a system-generated document.</p>
        </div>
    </div>
</body>
</html>
