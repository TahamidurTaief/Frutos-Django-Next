<!-- Generic Detail Modal (View Only) -->
<div class="modal fade show" id="detailModal" tabindex="-1" style="display: block;" aria-modal="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="ri-information-line me-2"></i>{{ meta.verbose_name }} Details
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <div class="modal-body">
                <div class="row g-3">
                    {% for field_data in fields_data %}
                        <div class="col-md-{% if 'description' in field_data.name or 'text' in field_data.name %}12{% else %}6{% endif %}">
                            <div class="mb-3">
                                <label class="form-label fw-semibold text-muted">
                                    {{ field_data.verbose_name }}
                                </label>
                                <div class="field-value">
                                    {{ field_data.value|safe }}
                                </div>
                            </div>
                        </div>
                    {% endfor %}
                </div>
            </div>
            
            <div class="modal-footer">
                {% if actions.change %}
                    <button 
                        hx-get="{% url 'dashboard:generic_model_update' app_label model_name instance.pk %}" 
                        hx-target="#modal-container" 
                        hx-swap="innerHTML"
                        class="btn btn-warning">
                        <i class="ri-edit-line me-1"></i>Edit
                    </button>
                {% endif %}
                
                <a 
                    href="{% url 'dashboard:generic_model_print' app_label model_name instance.pk %}" 
                    target="_blank"
                    class="btn btn-secondary">
                    <i class="ri-printer-line me-1"></i>Print
                </a>
                
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
                    <i class="ri-close-line me-1"></i>Close
                </button>
            </div>
        </div>
    </div>
</div>
<div class="modal-backdrop fade show"></div>

<script>
    // Handle modal close
    document.querySelectorAll('[data-bs-dismiss="modal"]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.getElementById('modal-container').innerHTML = '';
        });
    });
</script>

<style>
    #detailModal .field-value {
        padding: 0.75rem;
        background-color: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 0.375rem;
        min-height: 2.5rem;
        display: flex;
        align-items: center;
    }
</style>
