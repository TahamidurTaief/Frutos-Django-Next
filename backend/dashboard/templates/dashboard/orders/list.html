{% extends 'dashboard/base.html' %}

{% block title %}Orders List{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card bg-white border-0 rounded-10 mb-4">
            <div class="card-body p-4">
                <div class="d-sm-flex text-center justify-content-between align-items-center border-bottom pb-4 mb-4">
                    <h4 class="fw-semibold fs-18 mb-sm-0">Orders Management</h4>
                    <div class="d-flex gap-2">
                        <button type="button" 
                                class="btn btn-outline-success btn-sm d-flex align-items-center"
                                onclick="window.print()"
                                title="Print Order List">
                            <i class="material-symbols-outlined" style="font-size: 18px;">print</i>
                            <span class="ms-1">Print</span>
                        </button>
                        <a href="{% url 'dashboard:order_export_csv' %}?{{ request.GET.urlencode }}" 
                           class="btn btn-outline-info btn-sm d-flex align-items-center"
                           title="Export to CSV">
                            <i class="material-symbols-outlined" style="font-size: 18px;">download</i>
                            <span class="ms-1">Export CSV</span>
                        </a>
                        <button type="button" 
                                class="btn btn-primary d-flex align-items-center" 
                                hx-get="{% url 'dashboard:order_create' %}" 
                                hx-target="#modal-container" 
                                hx-swap="innerHTML">
                            <i class="material-symbols-outlined" style="font-size: 18px;">add</i>
                            <span class="ms-1">Add Order</span>
                        </button>
                    </div>
                </div>

                <!-- Search and Filters Section -->
                <div class="mb-4">
                    <form class="row g-2" hx-get="{% url 'dashboard:order_list' %}" hx-trigger="input changed delay:500ms from:input, change from:select" hx-target="#order-table-container" hx-indicator="#loading-spinner">
                        <div class="col-12 col-md-4">
                            <input type="text" 
                                   name="q" 
                                   class="form-control" 
                                   id="search-input" 
                                   placeholder="Search orders..." 
                                   value="{{ query }}"
                                   style="height: 2.5rem;">
                        </div>
                        <div class="col-12 col-md-3">
                            <select name="status" class="form-select" id="status-filter" style="height: 2.5rem; background-color: white;">
                                <option value="">All Status</option>
                                {% for value, label in order_statuses %}
                                    <option value="{{ value }}" {% if status_filter == value %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12 col-md-3">
                            <select name="payment_status" class="form-select" id="payment-status-filter" style="height: 2.5rem; background-color: white;">
                                <option value="">All Payment Status</option>
                                {% for value, label in payment_statuses %}
                                    <option value="{{ value }}" {% if payment_status_filter == value %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12 col-md-2 d-flex align-items-center justify-content-end">
                            <span id="loading-spinner" class="htmx-indicator" style="font-size: 0.875rem;">
                                <span class="spinner-border spinner-border-sm me-2" role="status" style="width: 1rem; height: 1rem;"></span> Loading...
                            </span>
                        </div>
                    </form>
                </div>
                
                <!-- Orders Table Container -->
                <div id="order-table-container">
                    {% include 'dashboard/orders/partials/order_table.html' %}
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Container for HTMX -->
<div id="modal-container"></div>

{% endblock %}

{% block extra_css %}
<style>
    .htmx-indicator {
        display: none;
    }
    .htmx-request .htmx-indicator {
        display: inline;
    }
    .htmx-swapping {
        opacity: 0;
        transition: opacity 200ms ease-in;
    }
    
    /* Status badge styling */
    .badge-status {
        font-size: 0.75rem;
        padding: 0.375rem 0.75rem;
        font-weight: 500;
        letter-spacing: 0.5px;
        border-radius: 0.25rem;
    }
    
    .badge-pending {
        background-color: #fca5a5;
        color: #7f1d1d;
    }
    
    .badge-processing {
        background-color: #bfdbfe;
        color: #1e3a8a;
    }
    
    .badge-shipped {
        background-color: #dbeafe;
        color: #0c4a6e;
    }
    
    .badge-delivered {
        background-color: #dcfce7;
        color: #166534;
    }
    
    .badge-cancelled {
        background-color: #f3f4f6;
        color: #4b5563;
    }
    
    .badge-paid {
        background-color: #dcfce7;
        color: #166534;
    }
    
    .badge-failed {
        background-color: #fca5a5;
        color: #7f1d1d;
    }
    
    /* Table action icons */
    .action-icons {
        display: flex;
        gap: 0.5rem;
        align-items: center;
    }
    
    .action-icon-btn {
        background: none;
        border: none;
        padding: 0.375rem 0.5rem;
        cursor: pointer;
        color: #6b7280;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }
    
    .action-icon-btn:hover {
        color: #3b82f6;
        transform: scale(1.15);
    }
    
    .action-icon-btn.delete:hover {
        color: #ef4444;
    }
    
    .action-icon-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        color: #d1d5db;
    }
    
    /* Dropdown styling */
    .status-dropdown {
        min-width: 120px;
        font-size: 0.875rem;
    }
    
    /* Form and modal improvements */
    .form-select,
    .form-control {
        border: 1px solid #d1d5db;
        padding: 0.5rem 0.75rem;
        border-radius: 0.375rem;
        height: 2.5rem; /* Consistent height for all inputs */
        background-color: white !important;
    }
    
    .form-select:focus,
    .form-control:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        outline: none;
        background-color: white !important;
    }
    
    .form-select {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 0.75rem center;
        background-size: 16px 12px;
        padding-right: 2.5rem;
    }
    
    /* Print styles */
    @media print {
        .print-actions, .modal, .btn, #modal-container {
            display: none !important;
        }
        
        .card {
            border: none !important;
            box-shadow: none !important;
        }
        
        .table {
            border: 1px solid #000 !important;
        }
        
        .table th, .table td {
            border: 1px solid #000 !important;
        }
    }
</style>

<script>
    // Export orders to CSV
    function exportToCSV() {
        const table = document.querySelector('#order-table-container table');
        if (!table) return;
        
        let csv = [];
        const headers = Array.from(table.querySelectorAll('thead th')).map(th => 
            th.textContent.trim().replace(/,/g, '')
        );
        csv.push(headers.join(','));
        
        // Get rows
        const rows = table.querySelectorAll('tbody tr');
        rows.forEach(row => {
            const cells = Array.from(row.querySelectorAll('td'));
            if (cells.length > 0) {
                const rowData = cells.map(cell => {
                    let text = cell.textContent.trim();
                    // Clean up specific data
                    text = text.replace(/\n/g, ' ').replace(/,/g, ';').replace(/"/g, '""');
                    return `"${text}"`;
                });
                csv.push(rowData.join(','));
            }
        });
        
        // Download
        const csvContent = csv.join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `orders_${new Date().toISOString().slice(0, 10)}.csv`;
        a.click();
        window.URL.revokeObjectURL(url);
    }
</script>
{% endblock %}
