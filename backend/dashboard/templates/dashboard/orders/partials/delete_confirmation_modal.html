<div class="modal fade" id="deleteConfirmationModal" tabindex="-1" role="dialog" aria-labelledby="deleteConfirmationLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm" role="document">
        <div class="modal-content">
            <div class="modal-header bg-danger bg-opacity-10 border-danger">
                <h5 class="modal-title text-danger" id="deleteConfirmationLabel">
                    <span class="material-symbols-outlined align-middle me-2">warning</span> Delete Order
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <div class="modal-body">
                <p class="mb-2">Are you sure you want to delete this order?</p>
                <div class="alert alert-warning mb-0" role="alert">
                    <small>
                        <strong>Order #{{ order.order_number }}</strong> - {{ order.customer_name }}<br>
                        Amount: <strong>{{ order.total_amount|floatformat:2 }} BDT</strong>
                    </small>
                </div>
                <p class="mt-3 mb-0 text-muted small">
                    <span class="material-symbols-outlined align-middle" style="font-size: 1rem;">info</span>
                    This action cannot be undone.
                </p>
            </div>
            
            <div class="modal-footer bg-light">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" 
                        class="btn btn-danger"
                        hx-delete="{% url 'dashboard:order_delete' order.pk %}"
                        hx-target="#order-table-container"
                        hx-swap="innerHTML"
                        hx-on="htmx:afterSwap: closeDeleteModal()">
                    <span class="material-symbols-outlined align-middle me-1">delete</span> Delete Order
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // Show modal
    const deleteModal = new bootstrap.Modal(document.getElementById('deleteConfirmationModal'));
    deleteModal.show();
    
    // Function to close modal after successful delete
    function closeDeleteModal() {
        deleteModal.hide();
        // Also close the detail modal if it's open
        const detailModal = bootstrap.Modal.getInstance(document.getElementById('orderDetailModal'));
        if (detailModal) {
            detailModal.hide();
        }
    }
</script>
